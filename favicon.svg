<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16151e"/>
      <stop offset="100%" stop-color="#07070a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2c06e"/>
      <stop offset="100%" stop-color="#b89438"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle top-left glow -->
  <ellipse cx="16" cy="14" rx="22" ry="18" fill="#c8a84b" fill-opacity="0.07"/>

  <!--
    "d." logotype mark:
    A bold lowercase "d" in Playfair-style weight,
    built from a circle + vertical stroke, plus a gold dot.
  -->

  <!-- Vertical stroke of the "d" -->
  <rect x="16" y="11" width="8" height="36" rx="4" fill="url(#gold)"/>

  <!-- Circular bowl of the "d" -->
  <!-- Outer circle (bowl) -->
  <circle cx="33" cy="35" r="13" fill="url(#gold)"/>
  <!-- Inner cutout -->
  <circle cx="33" cy="35" r="7.5" fill="url(#bg)"/>

  <!-- Bridge connecting stroke to bowl -->
  <rect x="16" y="28" width="17" height="8" rx="0" fill="url(#gold)"/>
  <!-- Smooth the bridge top-left corner into the stroke -->
  <rect x="16" y="28" width="8" height="8" fill="url(#gold)"/>

  <!-- Gold dot — the "." -->
  <circle cx="47" cy="49" r="4.5" fill="#e2c06e"/>
</svg>
